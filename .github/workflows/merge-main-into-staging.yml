name: Sync main to staging-docker

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  merge-main-to-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Checkout staging branch
        run: git checkout staging-docker

      - name: Merge main into staging-docker
        run: git merge main 

      - name: Push changes
        run: git push 
     
      - name: Notify Google Chat
        if: failure() 
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK }}" \
          -H "Content-Type: application/json" \
        -d '{
          "text": "❌ GitHub Action failed: merge from main to staging-docker failed in repository. Use git pull to get the latest update. '${{ github.repository }}'."
        }'
        uses: SimonScholz/google-chat-action@main
        with:
          webhookUrl: '${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}'
          jobStatus: '${{ job.status }}'